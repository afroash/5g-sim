# ============================================================
# nginx — Internet Sim
# Listens on all interfaces port 80.
# UEs reach this at http://10.100.0.1/ after full data path.
# ============================================================
server {
    listen 80 default_server;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Simple health endpoint
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
