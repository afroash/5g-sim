# ============================================================
# Internet Sim — FRR Configuration
# Role: Simulated internet. Upstream of spine1.
# Runs OSPF area 0, advertises a default route into the fabric.
# nginx listens on lo:10.100.0.1 as the "internet" HTTP target.
# ============================================================

frr version 9.1
frr defaults traditional
hostname internet-sim
log syslog informational
service integrated-vtysh-config

! --- Interface: uplink to spine1 ---
interface eth1
 ip address 10.0.0.1/30
 ip ospf area 0
 ip ospf mtu-ignore
 ip ospf hello-interval 10
 ip ospf dead-interval 40

! --- Loopback: stable address for nginx to bind to ---
interface lo
 ip address 10.100.0.1/32

! --- OSPF ---
router ospf
 ospf router-id 10.255.0.10
 passive-interface lo
 ! Advertise a default route into the fabric so all nodes
 ! can reach the internet-sim without explicit static routes
 default-information originate always metric 10
 network 10.0.0.0/30 area 0
 network 10.100.0.1/32 area 0

line vty
