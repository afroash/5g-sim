# ============================================================
# Server B — FRR Configuration
# Advertises loopback 10.1.1.1/32 into OSPF area 0.
# Also advertises UE pool 10.45.0.0/24 so return traffic
# from the internet-sim can find its way back to the UPF.
# ============================================================

frr version 9.1
frr defaults traditional
hostname server-b
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.1.1.1/32

interface eth1
 ip address 10.0.2.10/30
 ip ospf mtu-ignore
 ip ospf hello-interval 10
 ip ospf dead-interval 40
 ip ospf area 0

interface eth2
 ip address 10.0.2.14/30
 ip ospf mtu-ignore
 ip ospf hello-interval 10
 ip ospf dead-interval 40
 ip ospf area 0

router ospf
 ospf router-id 10.1.1.1
 passive-interface lo
 network 10.1.1.1/32 area 0
 network 10.0.2.8/30 area 0
 network 10.0.2.12/30 area 0
 ! UE pool advertised so return traffic routes back here
 network 10.45.0.0/24 area 0

line vty
