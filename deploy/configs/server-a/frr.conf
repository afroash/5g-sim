# ============================================================
# Server A — FRR Configuration
# Advertises loopback 10.1.0.1/32 into OSPF area 0.
# Learns default route and fabric prefixes from leaves.
# ============================================================

frr version 9.1
frr defaults traditional
hostname server-a
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.1.0.1/32
 ip ospf area 0

interface eth1
 ip address 10.0.2.2/30
 ip ospf mtu-ignore
 ip ospf hello-interval 10
 ip ospf dead-interval 40
 ip ospf area 0

interface eth2
 ip address 10.0.2.6/30
 ip ospf mtu-ignore
 ip ospf hello-interval 10
 ip ospf dead-interval 40
 ip ospf area 0

router ospf
 ospf router-id 10.1.0.1
 passive-interface lo
 network 10.1.0.1/32 area 0
 network 10.0.2.0/30 area 0
 network 10.0.2.4/30 area 0

line vty
